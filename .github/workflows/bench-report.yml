name: Benchmark Report

# Triggered manually -- supply the kernel name and the PR number to comment on.
# Reads from MLflow (results produced by HPC SLURM jobs); no GPU runner needed.
on:
  workflow_dispatch:
    inputs:
      kernel:
        description: "Kernel name to report on (e.g. rms_norm)"
        required: true
      pr_number:
        description: "PR number to post the benchmark comparison comment on"
        required: true

jobs:
  report:
    name: Pull MLflow results and post PR comment
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install mlflow pandas

      - name: Pull MLflow benchmark results
        # pull_mlflow_results.py queries MLflow for the latest runs for the given kernel
        # across all backends and writes a markdown comparison table to --output.
        run: |
          python experiments/scripts/pull_mlflow_results.py \
            --kernel "${{ github.event.inputs.kernel }}" \
            --output /tmp/bench_table.md
        env:
          # Set MLFLOW_TRACKING_URI in repo secrets. On HPC this is file://$SCRATCH/mlruns;
          # CI needs a reachable URI (e.g. a hosted MLflow server or S3-backed store).
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Post comparison table as PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.inputs.pr_number }}" \
            --body-file /tmp/bench_table.md \
            --repo "${{ github.repository }}"
