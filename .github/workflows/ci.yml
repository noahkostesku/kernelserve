name: CI

on:
  push:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# No GPU runners — kernel correctness tests run on HPC (Narval) via SLURM.
# See slurm/bench_job.sh for the HPC benchmark workflow.

jobs:
  lint-python:
    name: Python lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dev dependencies
        run: uv sync --dev

      - name: ruff check
        run: uv run ruff check experiments/ observability/ kernels/triton/ tests/

      - name: ruff format --check
        run: uv run ruff format --check experiments/ observability/ kernels/triton/ tests/

  lint-rust:
    name: Rust clippy & fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        # rust-toolchain.toml pins the workspace to this nightly.
        # rust-src and rustc-dev are required by cuda-device's proc-macros.
        run: |
          rustup toolchain install nightly-2026-04-03 \
            --component clippy --component rustfmt \
            --component rust-src --component rustc-dev

      - name: cargo clippy -D warnings
        working-directory: kernels/cuda_oxide
        # ci_no_cuda stubs out GPU-specific code paths so clippy can lint without CUDA headers.
        # rms_norm_standalone/ is excluded -- it requires CUDA hardware and nightly to build.
        run: cargo clippy --all-targets -- -D warnings
        env:
          RUSTFLAGS: "--cfg ci_no_cuda"

      - name: cargo fmt --check
        working-directory: kernels/cuda_oxide
        run: cargo fmt --check

  test-python:
    name: Python unit tests (no GPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Build PyO3 bindings
        run: |
          pip install maturin
          cd kernels/pyo3_bindings && maturin develop

      - name: pytest -m "not gpu"
        run: uv run pytest -m "not gpu" -x --tb=short

  build-check:
    name: Config & manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate pyproject.toml
        # tomllib is in the Python 3.11 stdlib -- no extra install needed.
        run: |
          python - <<'EOF'
          import tomllib, sys
          try:
              with open("pyproject.toml", "rb") as f:
                  tomllib.load(f)
              print("pyproject.toml: OK")
          except Exception as e:
              print(f"pyproject.toml: FAILED -- {e}", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Validate Cargo.toml files
        # RUSTUP_TOOLCHAIN overrides rust-toolchain.toml so stable is used for
        # metadata parsing without installing the nightly toolchain in this job.
        # --no-deps skips dependency resolution; this stays fast and offline.
        env:
          RUSTUP_TOOLCHAIN: stable
        run: |
          cargo metadata --no-deps --format-version 1 \
            --manifest-path kernels/cuda_oxide/Cargo.toml > /dev/null
          cargo metadata --no-deps --format-version 1 \
            --manifest-path kernels/rms_norm_standalone/Cargo.toml > /dev/null
