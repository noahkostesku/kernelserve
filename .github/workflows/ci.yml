name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python-lint:
    name: Python lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dev dependencies
        run: uv sync --dev

      - name: ruff check
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy kernels/triton serving observability experiments --ignore-missing-imports

  python-test:
    name: Python tests (no GPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests (CPU-only)
        run: uv run pytest -m "not gpu" --tb=short

  rust-check:
    name: Rust clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: clippy -D warnings
        working-directory: kernels/cuda_oxide
        # cuda-oxide requires CUDA headers; check without GPU features for CI
        run: cargo clippy --all-targets -- -D warnings
        env:
          RUSTFLAGS: "--cfg ci_no_cuda"
