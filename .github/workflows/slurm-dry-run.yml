name: SLURM Dry Run

# Only fires when a PR touches files under slurm/.
on:
  pull_request:
    paths:
      - "slurm/**"

jobs:
  validate:
    name: Validate SLURM scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck slurm/*.sh
        # --severity=error: only fail on actual errors, not style warnings.
        # Subdirectory scripts (slurm/scripts/, slurm/templates/) are support files
        # and are not checked here.
        run: |
          find slurm -maxdepth 1 -name "*.sh" | sort | while IFS= read -r script; do
            echo "shellcheck: $script"
            shellcheck --severity=error "$script"
          done

      - name: Validate --output/--error directives use %u
        # Catches hardcoded usernames like /scratch/someuser/; %u is the SLURM
        # substitution token for the submitting user's login name.
        run: |
          python3 - <<'EOF'
          import re, sys, pathlib

          errors = []
          DIRECTIVE_RE = re.compile(r"^#SBATCH\s+--(?:output|error)=(.+)$")

          for script in sorted(pathlib.Path("slurm").glob("*.sh")):
              for lineno, line in enumerate(script.read_text().splitlines(), 1):
                  m = DIRECTIVE_RE.match(line.strip())
                  if not m:
                      continue
                  path = m.group(1).strip()
                  # Flag /scratch/ paths that don't use %u (hardcoded username)
                  if "/scratch/" in path and "%u" not in path:
                      errors.append(
                          f"{script}:{lineno}: --output/--error uses hardcoded path; "
                          f"use %u instead -- {line.strip()}"
                      )

          if errors:
              for e in errors:
                  print(f"FAIL: {e}", file=sys.stderr)
              sys.exit(1)

          print("All --output/--error directives use %u for username.")
          EOF

      - name: Check for bare python calls (must use srun)
        # Scripts that have no srun calls are exempt (e.g. legacy bench_job.sh which uses
        # pytest directly, or serving_job.sh which starts a long-running server process).
        # Scripts that do use srun must be consistent -- every python/uv run call must
        # go through srun so SLURM can track and limit resources correctly.
        run: |
          python3 - <<'EOF'
          import re, sys, pathlib

          errors = []
          BARE_PYTHON_RE = re.compile(r"^\s*(python3?|uv\s+run)\s")

          for script in sorted(pathlib.Path("slurm").glob("*.sh")):
              text = script.read_text()
              # Only check scripts that already use srun.
              if "srun" not in text:
                  continue
              for lineno, line in enumerate(text.splitlines(), 1):
                  if not line.strip() or line.strip().startswith("#"):
                      continue
                  if "srun" in line:
                      continue
                  if BARE_PYTHON_RE.match(line):
                      errors.append(
                          f"{script}:{lineno}: python call without srun -- {line.strip()}"
                      )

          if errors:
              for e in errors:
                  print(f"FAIL: {e}", file=sys.stderr)
              sys.exit(1)

          print("No bare python calls found in srun-enabled scripts.")
          EOF
